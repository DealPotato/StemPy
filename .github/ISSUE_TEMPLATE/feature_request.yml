name: Feature request
description: Suggest a focused improvement for StemPy
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or currently impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe what StemPy should do from the user's perspective.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - EZ UI
        - Advanced UI
        - Models and presets
        - Scanner
        - Separation and audio output
        - Runtime and installation
        - Documentation
        - Other
    validations:
      required: true
